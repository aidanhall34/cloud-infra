---
# Prometheus configuration for the grafana/otel-lgtm development container.
# Mounted over /otel-lgtm/prometheus.yaml — replaces the bundled config.
# Preserves all original settings and adds scrape_configs for all LGTM services.

global:
  scrape_interval: 15s
  scrape_native_histograms: true

# OTLP push ingestion — keeps the built-in behaviour (otelcol forwards metrics here).
otlp:
  keep_identifying_resource_attributes: true
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database
    - kafka.cluster.alias

storage:
  tsdb:
    out_of_order_time_window: 10m

# OTLP trace export — Prometheus instruments its own query and scrape paths.
# Traces are sent to the otelcol-contrib instance bundled in this container.
# endpoint format is host:port (no scheme) — the client_type determines the protocol.
tracing:
  endpoint: "localhost:4317"
  client_type: grpc

# ── Scrape configs ─────────────────────────────────────────────────────────────
# All services run on localhost inside the single grafana/otel-lgtm container.

scrape_configs:
  # Prometheus scrapes itself.
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  # otelcol-contrib self-metrics (detailed level set in otelcol-extra.yaml).
  - job_name: otelcol
    static_configs:
      - targets: ["127.0.0.1:8888"]

  # Loki — log aggregation.
  - job_name: loki
    static_configs:
      - targets: ["127.0.0.1:3100"]

  # Tempo — distributed tracing.
  - job_name: tempo
    static_configs:
      - targets: ["127.0.0.1:3200"]

  # Grafana — dashboard server.
  - job_name: grafana
    static_configs:
      - targets: ["127.0.0.1:3000"]

  # Pyroscope — continuous profiling (HTTP on default port 4040).
  - job_name: pyroscope
    static_configs:
      - targets: ["127.0.0.1:4040"]

  # Grafana MCP server — runs as a sidecar container, metrics on port 8001.
  - job_name: mcp-grafana
    static_configs:
      - targets: ["mcp-grafana:8001"]

  # Grafana image renderer — ENABLE_METRICS=true serves /metrics on port 8081.
  - job_name: renderer
    static_configs:
      - targets: ["renderer:8081"]
