---
# Local LGTM development stack using the Grafana all-in-one image.
# Bundles: OpenTelemetry Collector, Prometheus, Loki, Tempo, Pyroscope, Grafana.
# https://github.com/grafana/docker-otel-lgtm
#
# Grafana:           http://localhost:3000  (anonymous admin, no login required)
# OTLP gRPC:         localhost:4317
# OTLP HTTP:         localhost:4318
# Prometheus:        http://localhost:9090
# otelcol health:    http://localhost:13133/health/status
# Grafana MCP (SSE): http://localhost:8000/sse
# Image renderer:    http://localhost:8081 (internal only)
#
# Profiles:
#   scheduled  — includes the hourly backup daemon (used by dev-up)
#   instant    — used by `make dev-backup` for on-demand backups

# Shared backup config — referenced by both backup services via YAML anchors.
x-backup-base: &backup-base
  image: offen/docker-volume-backup:latest
  env_file:
    # Generated by `make dev-backup-secrets` — contains S3 credentials and bucket config.
    - path: ../secrets/dev-backup.env
      required: true
  environment:
    BACKUP_FILENAME: "homelab-%Y%m%d-%H%M%S.tar.gz"
    BACKUP_RETENTION_DAYS: "5"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - prometheus_data:/backup/prometheus:ro
    - loki_data:/backup/loki:ro
    - tempo_data:/backup/tempo:ro

services:
  lgtm:
    image: grafana/otel-lgtm:${LGTM_VERSION:?LGTM_VERSION must be set (run via make dev-up)}
    container_name: dev-lgtm
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "3000:3000"     # Grafana UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    env_file:
      # Generated by `make dev-secrets` — contains GF_SECURITY_ADMIN_PASSWORD.
      - path: ../secrets/dev-grafana.env
        required: true
    environment:
      # Anonymous auth — admin role, no login required for local debugging.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_LOG_MODE: console
      GF_LOG_CONSOLE_FORMAT: json
      ENABLE_LOGS_ALL: "true"
      # Enable admin API so the backup exec-pre hook can call /api/v1/admin/tsdb/snapshot.
      PROMETHEUS_EXTRA_ARGS: "--web.enable-admin-api"
      # Image renderer — GF_RENDERING_RENDERER_TOKEN comes from dev-grafana.env.
      GF_RENDERING_SERVER_URL: "http://renderer:8081/render"
      GF_RENDERING_CALLBACK_URL: "http://lgtm:3000/"
      # OpenTelemetry tracing — otelcol runs inside this container on localhost:4317.
      GF_TRACING_OPENTELEMETRY_OTLP_ADDRESS: "localhost:4317"
      GF_TRACING_OPENTELEMETRY_OTLP_PROPAGATION: "w3c"
      GF_TRACING_OPENTELEMETRY_OTLP_INSECURE: "true"
      GF_TRACING_OPENTELEMETRY_SAMPLER_TYPE: "probabilistic"
      GF_TRACING_OPENTELEMETRY_SAMPLER_PARAM: ".01"
    volumes:
      # Extra otelcol config — filelog, spanmetrics connector, health_check extension.
      - ./otelcol-config.yaml:/otel-lgtm/otelcol-config.yaml:ro
      # Prometheus config — replaces built-in; adds scrape_configs for all LGTM services.
      - ./prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      # Shared log directory — make recipes tee output here, otelcol filelog reads it.
      - ./logs:/dev/logs
      # Custom Grafana dashboards — provisioning config adds a provider for this directory.
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/homelab-dashboards.yaml:ro
      # Persistent telemetry storage — WALs and blocks survive container restarts/recreation.
      - prometheus_data:/data/prometheus
      - loki_data:/data/loki
      - tempo_data:/data/tempo
    labels:
      # offen/docker-volume-backup: run these commands inside the lgtm container before each backup.
      # 1. Prometheus: flush WAL to a consistent TSDB snapshot block.
      # 2. Loki: flush all in-memory chunks to the backing store.
      # 3. Tempo: flush all in-memory traces to the WAL before archiving.
      docker-volume-backup.archive-pre: >-
        curl -sf -XPOST http://localhost:9090/api/v1/admin/tsdb/snapshot &&
        curl -sf -XPOST http://localhost:3100/flush &&
        curl -sf -XPOST http://localhost:3200/flush && sleep 5
    healthcheck:
      # Polls every bundled service on its own health/ready endpoint.
      # All six must return HTTP 2xx for the container to be considered healthy.
      #   Grafana:    /api/health
      #   Prometheus: /-/healthy
      #   Loki:       /ready         (port 3100)
      #   Tempo:      /ready         (port 3200)
      #   Pyroscope:  /ready         (port 4040)
      #   otelcol:    /              (health_check extension, port 13133)
      test:
        - "CMD-SHELL"
        - >-
          curl -sf http://localhost:3000/api/health &&
          curl -sf http://localhost:9090/-/healthy &&
          curl -sf http://localhost:3100/ready &&
          curl -sf http://localhost:3200/ready &&
          curl -sf http://localhost:4040/ready &&
          curl -sf http://localhost:13133/health/status
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mcp-grafana:
    image: grafana/mcp-grafana:latest
    container_name: dev-mcp-grafana
    restart: unless-stopped
    depends_on:
      lgtm:
        condition: service_healthy
    command: ["-transport", "streamable-http", "-address", "0.0.0.0:8000", "-metrics", "-metrics-address", ":8001"]
    ports:
      - "8000:8000"
      - "8001:8001"     # Prometheus metrics
    env_file:
      # Generated by `make dev-secrets` — contains GRAFANA_URL=http://lgtm:3000 (anonymous admin, no token needed).
      - path: ../secrets/dev-grafana.env
        required: true
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://lgtm:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Scheduled backup daemon — started by `make dev-up` (profile: scheduled).
  # Runs an hourly backup via cron and keeps the last 5 days of backups.
  backup:
    <<: *backup-base
    container_name: dev-backup
    restart: unless-stopped
    depends_on:
      lgtm:
        condition: service_healthy
    environment:
      BACKUP_FILENAME: "homelab-%Y%m%d-%H%M%S.tar.gz"
      BACKUP_RETENTION_DAYS: "5"
      BACKUP_CRON_EXPRESSION: "@daily"
    profiles:
      - scheduled

  # Instant backup — used by `make dev-backup` for on-demand runs (profile: instant).
  # No cron expression: the container runs one backup immediately and exits.
  backup-instant:
    <<: *backup-base
    entrypoint:
      - backup
    container_name: dev-backup-instant
    profiles:
      - instant

  renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: dev-renderer
    restart: unless-stopped
    ports:
      - "8081:8081"     # Prometheus metrics (ENABLE_METRICS=true serves /metrics here too)
    env_file:
      # Generated by `make dev-secrets` — contains AUTH_TOKEN.
      - path: ../secrets/dev-grafana.env
        required: true
    environment:
      HTTP_PORT: "8081"
      ENABLE_METRICS: "true"
      BROWSER_TZ: "UTC"
      # OpenTelemetry tracing — otelcol is in the lgtm container, reachable via service name.
      TRACING_ENDPOINT: "grpc://lgtm:4317"
      TRACING_INSECURE: "true"
      TRACING_SERVICE_NAME: "grafana-image-renderer"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8081'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  prometheus_data:
    name: dev-prometheus-data
    external: true
  loki_data:
    name: dev-loki-data
    external: true
  tempo_data:
    name: dev-tempo-data
    external: true
