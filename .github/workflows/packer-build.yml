name: packer-build

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - "packer/**"
      - ".github/workflows/packer-build.yml"

# Cancel in-progress runs on the same branch when a newer push arrives.
concurrency:
  group: packer-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup GitHub CLI
        uses: ./.github/actions/setup-gh

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python venvs
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} setup

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3

      - name: Packer init
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} packer-init

      - name: Build gateway image
        env:
          LINODE_CLI_TOKEN: ${{ secrets.LINODE_TOKEN }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} packer-build-gateway

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "packer-build — ${{ github.ref_name }}"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
