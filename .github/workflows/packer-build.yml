name: packer-build

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - "packer/**"
      - ".github/workflows/packer-build.yml"

# Cancel in-progress runs on the same branch when a newer push arrives.
concurrency:
  group: packer-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate homelab-deploy app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homelab-deploy

      - name: Dispatch packer-build to homelab-deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/aidanhall34/homelab-deploy/dispatches \
            --method POST \
            -f event_type="packer-build" \
            -F client_payload[sha]="${{ github.sha }}" \
            -F client_payload[ref]="${{ github.ref }}" \
            -F client_payload[branch]="${{ github.ref_name }}"
