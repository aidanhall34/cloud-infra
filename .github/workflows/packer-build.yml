name: packer-build

on:
  push:
    branches:
      - main
    paths:
      - "ansible/**"
      - "packer/**"
      - ".github/workflows/packer-build.yml"

# Cancel in-progress runs on the same branch when a newer push arrives.
concurrency:
  group: packer-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup GitHub CLI
        uses: ./.github/actions/setup-gh

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Generate homelab-deploy app token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homelab-deploy

      - name: Dispatch packer-build to homelab-deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/aidanhall34/homelab-deploy/dispatches \
            --method POST \
            -f event_type="packer-build" \
            -F client_payload[sha]="${{ github.sha }}" \
            -F client_payload[ref]="${{ github.ref }}" \
            -F client_payload[branch]="${{ github.ref_name }}"

      - name: Notify Discord
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "packer-build dispatched — ${{ github.ref_name }}"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
