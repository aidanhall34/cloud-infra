name: molecule-gateway

# Triggered manually from any dev branch.
# Must pass before a branch can be merged — configure as a required status check
# in GitHub: Settings → Branches → Branch protection rules → molecule-gateway.

on:
  workflow_dispatch:

jobs:
  molecule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python venvs
        run: make setup

      - name: Run molecule gateway tests
        run: make ansible-molecule-gateway

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "molecule-gateway — ${{ github.ref_name }}"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
