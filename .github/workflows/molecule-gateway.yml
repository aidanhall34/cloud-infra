name: molecule-gateway

# Triggered manually from any dev branch.
# After the gate job completes it writes a commit status to the checked-out SHA.
# Branch protection requires the commit status context "molecule-gateway/gate"
# (set via `make configure-branch-protection`).

on:
  workflow_dispatch:

jobs:
  molecule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python venvs
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} setup

      - name: Run molecule gateway tests
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ansible-molecule-gateway

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "molecule-gateway — ${{ github.ref_name }}"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}

  # Aggregator — the only context required by branch protection.
  # Add future molecule jobs to `needs` here; the branch rule never needs to change.
  # Writes a commit status so the result is visible to PR merge gates even though
  # this workflow is triggered by workflow_dispatch (not pull_request).
  gate:
    runs-on: ubuntu-latest
    needs: [molecule]
    if: always()
    steps:
      - name: Evaluate molecule results
        id: evaluate
        run: |
          results='${{ toJSON(needs) }}'
          failed=$(echo "$results" | jq -r '[to_entries[] | select(.value.result != "success")] | length')
          if [ "$failed" -gt 0 ]; then
            echo "One or more molecule jobs did not succeed:"
            echo "$results" | jq -r 'to_entries[] | "  \(.key): \(.value.result)"'
            echo "state=failure" >> "$GITHUB_OUTPUT"
          else
            echo "All molecule jobs passed."
            echo "state=success" >> "$GITHUB_OUTPUT"
          fi

      - name: Post commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --method POST \
            -f state="${{ steps.evaluate.outputs.state }}" \
            -f context="molecule-gateway/gate" \
            -f description="Molecule tests: ${{ steps.evaluate.outputs.state }}" \
            -f target_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Fail if tests did not pass
        if: steps.evaluate.outputs.state != 'success'
        run: exit 1
