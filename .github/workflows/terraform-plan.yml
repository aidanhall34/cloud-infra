name: terraform-plan

on:
  # Manual trigger for terraform-only changes (no ansible/packer changes).
  # The automatic packer → terraform chain runs entirely within homelab-deploy.
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Generate homelab-deploy app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homelab-deploy

      - name: Dispatch terraform-plan to homelab-deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/aidanhall34/homelab-deploy/dispatches \
            --method POST \
            -f event_type="terraform-plan" \
            -F client_payload[sha]="${{ github.sha }}" \
            -F client_payload[ref]="${{ github.ref }}" \
            -F client_payload[branch]="${{ github.ref_name }}"
