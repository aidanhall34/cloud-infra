name: terraform-plan

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - "ansible/**"
      - "packer/**"
      - ".github/workflows/terraform-plan.yml"

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python venvs
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} setup

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform plan
        env:
          LINODE_CLI_TOKEN:              ${{ secrets.LINODE_TOKEN }}
          TF_VAR_ssh_public_key:         ${{ secrets.TF_SSH_PUBLIC_KEY }}
          TF_VAR_allowed_ip_range:       ${{ secrets.TF_ALLOWED_IP_RANGE }}
          OTEL_EXPORTER_OTLP_ENDPOINT:   ${{ secrets.OTEL_ENDPOINT }}
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} tf-plan

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "terraform-plan — ${{ github.head_ref }}"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
