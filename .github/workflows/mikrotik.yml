name: mikrotik

# Local-only workflow — run via `make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} ci-mikrotik`, not triggered by GitHub.
# Secrets are passed directly by the Makefile act invocation.

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python venvs
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} setup

      - name: Install Ansible collections
        run: cd ansible && uv run --active ansible-galaxy collection install -r requirements.yml -p .collections

      - name: Configure MikroTik WireGuard
        env:
          MIKROTIK_HOST: ${{ secrets.MIKROTIK_HOST }}
          MIKROTIK_USERNAME: ${{ secrets.MIKROTIK_USERNAME }}
          MIKROTIK_PASSWORD: ${{ secrets.MIKROTIK_PASSWORD }}
          MIKROTIK_WG_PRIVATE_KEY: ${{ secrets.MIKROTIK_WG_PRIVATE_KEY }}
          MIKROTIK_WG_GATEWAY_PUBLIC_KEY: ${{ secrets.MIKROTIK_WG_GATEWAY_PUBLIC_KEY }}
          MIKROTIK_WG_GATEWAY_ENDPOINT: ${{ secrets.MIKROTIK_WG_GATEWAY_ENDPOINT }}
        run: |
          cd ansible && uv run --active ansible-playbook mikrotik.yml \
            -e mikrotik_host="$MIKROTIK_HOST" \
            -e mikrotik_username="$MIKROTIK_USERNAME" \
            -e mikrotik_password="$MIKROTIK_PASSWORD" \
            -e mikrotik_wg_private_key="$MIKROTIK_WG_PRIVATE_KEY" \
            -e mikrotik_wg_gateway_public_key="$MIKROTIK_WG_GATEWAY_PUBLIC_KEY" \
            -e mikrotik_wg_gateway_endpoint="$MIKROTIK_WG_GATEWAY_ENDPOINT"

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "mikrotik — WireGuard configure"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
