name: terraform-apply

on:
  # Automatically triggered after a successful packer-build run on main.
  workflow_run:
    workflows:
      - packer-build
    types:
      - completed
  # Manual trigger — useful for re-deploying or local act runs.
  workflow_dispatch:

# Shared concurrency group with packer-build.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  apply:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install Python venvs
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} setup

      - name: Terraform deploy
        env:
          LINODE_CLI_TOKEN:            ${{ secrets.LINODE_TOKEN }}
          TF_VAR_ssh_public_key:       ${{ secrets.TF_SSH_PUBLIC_KEY }}
          TF_VAR_allowed_ip_range:     ${{ secrets.TF_ALLOWED_IP_RANGE }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_ENDPOINT }}
        run: make GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} tf-deploy

      - name: Notify Discord
        if: always()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "terraform-apply — gateway"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
