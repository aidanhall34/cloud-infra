name: terraform-apply

on:
  # Manual trigger — useful for re-deploying without a code change.
  # The automatic plan → apply chain runs entirely within homelab-deploy.
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup GitHub CLI
        uses: ./.github/actions/setup-gh

      - name: Record start time
        id: start
        run: echo "ts=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - name: Verify terraform-apply status is pending
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/statuses" \
            --jq '[.[] | select(.context == "terraform-apply")] | first | .state // "none"')
          echo "terraform-apply status: $state"
          if [ "$state" != "pending" ]; then
            echo "Error: expected 'pending', got '$state'."
            echo "Run the terraform-plan workflow against this commit before applying."
            exit 1
          fi

      - name: Generate homelab-deploy app token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homelab-deploy

      - name: Dispatch terraform-apply to homelab-deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/aidanhall34/homelab-deploy/dispatches \
            --method POST \
            -f event_type="terraform-apply" \
            -F client_payload[sha]="${{ github.sha }}" \
            -F client_payload[ref]="${{ github.ref }}" \
            -F client_payload[branch]="${{ github.ref_name }}"

      - name: Notify Discord
        if: failure()
        uses: ./.github/actions/notify-discord
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "terraform-apply dispatched — ${{ github.ref_name }}"
          job-start-time: ${{ steps.start.outputs.ts }}
          run-id: ${{ github.run_id }}
          run-number: ${{ github.run_number }}
          repo: ${{ github.repository }}
