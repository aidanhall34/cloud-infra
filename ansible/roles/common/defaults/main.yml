---
# Alpine repository mirror — "latest-stable" always resolves to the current release.
common_alpine_repo_base: "https://dl-cdn.alpinelinux.org/alpine/latest-stable"

# Packages installed on every VM.
common_packages:
  - curl
  - wget
  - unzip
  - chrony
  - openssh

# cloud-init OCI datasource — Oracle is preferred; ConfigDrive and NoCloud as fallback.
common_cloud_init_datasources:
  - Oracle
  - ConfigDrive
  - NoCloud
  - None

# cloud-init log format: json ensures structured logging per service conventions.
common_cloud_init_log_format: json

# otelcol-contrib release to install.
common_otelcol_version: "0.131.0"
