---
# Molecule test suite for the common role.
# Uses the Docker driver with a privileged Alpine container (OpenRC).

dependency:
  name: galaxy
  options:
    requirements-file: ../../../../requirements.yml
    collections-path: ../../../../.collections

driver:
  name: docker

platforms:
  - name: alpine-common
    image: alpine:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp
    command: /sbin/init

provisioner:
  name: ansible
  inventory:
    group_vars:
      all:
        # Alpine installs Python 3 to /usr/bin/python3. Pin the path so Ansible
        # does not attempt auto-discovery, which fails on a minimal Alpine image.
        ansible_python_interpreter: /usr/bin/python3

# molecule 26: env and config moved out of provisioner into top-level ansible key
ansible:
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
    ANSIBLE_LIBRARY: "${MOLECULE_PROJECT_DIRECTORY}/../../library"
    ANSIBLE_STDOUT_CALLBACK: json

verifier:
  name: ansible
