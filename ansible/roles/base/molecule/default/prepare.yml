---
# Pre-role preparation: ensure the container has the minimum tooling the base
# role expects (Python 3, OpenRC, apk community repo enabled).

- name: Prepare Alpine container
  hosts: all
  gather_facts: false

  tasks:
    - name: Install Python 3 (required by Ansible itself)
      ansible.builtin.raw: apk add --no-cache python3
      changed_when: true

    - name: Ensure openrc is installed
      ansible.builtin.raw: apk add --no-cache openrc
      changed_when: true

    - name: Ensure /etc/apk/repositories exists
      ansible.builtin.raw: test -f /etc/apk/repositories || echo "" > /etc/apk/repositories
      changed_when: true
