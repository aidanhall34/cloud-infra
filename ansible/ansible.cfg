[defaults]
# Custom module library — rc_update and any future homelab-specific modules.
library            = library
roles_path         = roles
collections_path   = .collections
interpreter_python = /usr/bin/python3
# JSONL stdout callback — satisfies the "commands should produce JSON output" convention.
stdout_callback    = ansible.posix.jsonl
stderr_callback    = ansible.posix.jsonl
# Additional callbacks — opentelemetry sends traces to the local LGTM collector.
# The OTLP endpoint is read from the standard OTel SDK env var:
#   gRPC (default): OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
#   HTTP:           OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
#                   (also set OTEL_EXPORTER_OTLP_TRACES_PROTOCOL=http/protobuf)
# If the collector is not running, export errors are logged but do not fail the play.
callbacks_enabled  = community.general.opentelemetry

[callback_opentelemetry]
otel_service_name                   = ansible-homelab
# grpc matches the default OTLP gRPC port (4317) used in dev/docker-compose.yml.
otel_exporter_otlp_traces_protocol  = grpc

[ssh_connection]
pipelining = true
